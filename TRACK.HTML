<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track Your Order</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .container {
      background: white;
      padding: 30px 40px;
      border-radius: 12px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
      color: #333;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 15px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      background-color: #007bff;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 6px;
      background-color: #f1f1f1;
      color: #333;
      min-height: 50px;
    }

    .status span {
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Track Your Order</h1>
    <input type="text" id="orderId" placeholder="Enter your Order ID">
    <button onclick="trackOrder()">Track</button>
    <div class="status" id="status">Your order status will appear here</div>
  </div>

 <script>
  async function trackOrder() {
    const orderId = document.getElementById('orderId').value.trim();
    const statusDiv = document.getElementById('status');

    if(orderId === "") {
      statusDiv.innerHTML = "Please enter a valid Order ID!";
      statusDiv.style.backgroundColor = "#ffe6e6";
      return;
    }

    try {
      const res = await fetch(`http://localhost:3001/api/orders/${orderId}`);
      if (res.status === 404) {
        statusDiv.innerHTML = `Order ID <span>${orderId}</span> not found!`;
        statusDiv.style.backgroundColor = "#ffe6e6";
        return;
      }
      const order = await res.json();
      statusDiv.innerHTML = `Order ID <span>${orderId}</span>: ${order.status || 'No status'}`;
      statusDiv.style.backgroundColor = "#e6ffe6";
    } catch (err) {
      statusDiv.innerHTML = "Error connecting to server!";
      statusDiv.style.backgroundColor = "#ffe6e6";
    }
  }
</script>

</body>
</html>
